 apiVersion: v1
 kind: Service
 metadata:
   name: postgres-service
   namespace: production # Namespace in which the service will be created
 spec:
   type: NodePort # used to forward the port to outside world
   selector:
     app: postgres
   ports:
     - protocol: TCP
       port: 5432 # for differentiating between these port,targetPort and nodePort refer google docs
       targetPort: 5432
       nodePort: 30432